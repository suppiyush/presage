services:
  - type: web
    name: aignition-backend
    runtime: python
    plan: free
    rootDir: dashboard
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://presage-mu.vercel.app
      - key: GEMINI_API_KEY
        sync: false   # optional – only needed for AI narrative feature
